name = "o2n-auth-proxy"
main = "src/index.ts"
compatibility_date = "2026-07-01"

# `wrangler kv:namespace create OAUTH_STATE` の出力idをここに設定する
[[kv_namespaces]]
binding = "OAUTH_STATE"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# 秘密情報は `wrangler secret put NOTION_CLIENT_SECRET` で設定する（このファイルには書かない）
[vars]
NOTION_CLIENT_ID = "REPLACE_WITH_CLIENT_ID"
