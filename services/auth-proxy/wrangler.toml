name = "o2n-auth-proxy"
main = "src/index.ts"
compatibility_date = "2026-07-01"

# `wrangler kv:namespace create OAUTH_STATE` の出力idをここに設定する
[[kv_namespaces]]
binding = "OAUTH_STATE"
id = "92e3eff9fc3944fd83e5d69bc397f03a"

[[durable_objects.bindings]]
name = "OAUTH_SESSIONS"
class_name = "OAuthSessions"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["OAuthSessions"]

[[ratelimits]]
name = "SESSION_RATE_LIMITER"
# Cloudflare account内で一意の正整数文字列に変更する
namespace_id = "41723001"

  [ratelimits.simple]
  limit = 10
  period = 60

[[ratelimits]]
name = "CALLBACK_RATE_LIMITER"
# Cloudflare account内で一意の正整数文字列に変更する
namespace_id = "41723003"

  [ratelimits.simple]
  limit = 10
  period = 60

[[ratelimits]]
name = "EXCHANGE_RATE_LIMITER"
# Cloudflare account内で一意の正整数文字列に変更する
namespace_id = "41723002"

  [ratelimits.simple]
  limit = 20
  period = 60

# 秘密情報は `wrangler secret put NOTION_CLIENT_SECRET` で設定する（このファイルには書かない）
[vars]
NOTION_CLIENT_ID = "3a1d872b-594c-8121-94df-0037908f8601"
OAUTH_ENABLED = "0"
