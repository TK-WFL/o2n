name: Publish npm packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact version already set in all package manifests
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  verify:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
      artifact-digest: ${{ steps.upload.outputs.artifact-digest }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm ci
        working-directory: services/auth-proxy
      - run: npm run build --workspace packages/core
      - run: npm run typecheck
      - run: npm run typecheck
        working-directory: services/auth-proxy
      - run: npm test
      - run: npm audit
      - run: npm audit
        working-directory: services/auth-proxy
      - name: Build publishable packages in dependency order
        run: |
          npm run build --workspace packages/core
          npm run build --workspace packages/cli
          npm run build --workspace packages/mcp-server
      - name: Create and inspect fixed release tarballs
        run: node scripts/verify-release.mjs "$RELEASE_VERSION" --check-registry --pack-dir=release-artifacts
        env:
          RELEASE_VERSION: ${{ inputs.version }}
      - name: Upload immutable release artifact
        id: upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-release-${{ github.sha }}
          path: |
            release-artifacts/o2n-core.tgz
            release-artifacts/o2n-cli.tgz
            release-artifacts/o2n-mcp-server.tgz
            release-artifacts/SHA256SUMS
          if-no-files-found: error
          compression-level: 0
          retention-days: 1

  publish:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: npm-publish
    permissions:
      id-token: write
    steps:
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
      - name: Require an npm CLI with trusted publishing support
        run: |
          node -e 'const [major, minor] = process.argv[1].split(".").map(Number); if (major < 11 || (major === 11 && minor < 5)) process.exit(1)' "$(npm --version)"
          npm --version
      - name: Download verified artifact by immutable ID
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.verify.outputs.artifact-id }}
          path: ${{ runner.temp }}/npm-release
          digest-mismatch: error
      - name: Verify fixed artifact boundary
        working-directory: ${{ runner.temp }}/npm-release
        run: |
          test -n "$EXPECTED_ARTIFACT_DIGEST"
          test "$(find . -mindepth 1 -maxdepth 1 | wc -l)" -eq 4
          test "$(find . -mindepth 1 -maxdepth 1 -type f | wc -l)" -eq 4
          for file in o2n-core.tgz o2n-cli.tgz o2n-mcp-server.tgz SHA256SUMS; do
            test -f "$file"
            test ! -L "$file"
          done
          sha256sum --check --strict SHA256SUMS
          echo "Verified Actions artifact digest: $EXPECTED_ARTIFACT_DIGEST"
        env:
          EXPECTED_ARTIFACT_DIGEST: ${{ needs.verify.outputs.artifact-digest }}
      - name: Publish core with provenance
        run: npm publish "$RUNNER_TEMP/npm-release/o2n-core.tgz" --access public --provenance --ignore-scripts
      - name: Confirm core is available from npm
        run: |
          for attempt in 1 2 3 4 5 6; do
            if [ "$(npm view "@tk_wfl/o2n-core@$RELEASE_VERSION" version)" = "$RELEASE_VERSION" ]; then
              exit 0
            fi
            sleep 10
          done
          exit 1
        env:
          RELEASE_VERSION: ${{ inputs.version }}
      - name: Publish core consumers with provenance
        run: |
          npm publish "$RUNNER_TEMP/npm-release/o2n-cli.tgz" --access public --provenance --ignore-scripts
          npm publish "$RUNNER_TEMP/npm-release/o2n-mcp-server.tgz" --access public --provenance --ignore-scripts
